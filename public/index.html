<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>termi</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --surface2:  #1e1e1e;
    --border:    #2a2a2a;
    --accent:    #00e676;
    --accent-dim:#00e67622;
    --blue:      #448aff;
    --blue-dim:  #448aff22;
    --red:       #ff5252;
    --text:      #ececec;
    --muted:     #666;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'Space Grotesk', sans-serif;
    --radius:    16px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top:    env(safe-area-inset-top, 0px);
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
height: 100dvh;
background: var(--bg);
color: var(--text);
font-family: var(--sans);
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

/* ── Auth Screen ─────────────────────────────────── */
#auth {
position: fixed;
inset: 0;
background: var(--bg);
display: flex;
align-items: center;
justify-content: center;
z-index: 100;
padding: 24px;
}

.auth-card {
width: 100%;
max-width: 360px;
display: flex;
flex-direction: column;
gap: 24px;
}

.auth-logo {
display: flex;
align-items: center;
gap: 10px;
}

.auth-logo-icon {
width: 40px;
height: 40px;
background: var(--accent);
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-family: var(--mono);
font-weight: 600;
font-size: 18px;
color: #000;
flex-shrink: 0;
}

.auth-logo-text {
font-family: var(--mono);
font-size: 22px;
font-weight: 600;
letter-spacing: -0.5px;
}

.auth-logo-text span { color: var(--accent); }

.auth-subtitle {
font-size: 14px;
color: var(--muted);
line-height: 1.5;
}

.auth-field {
display: flex;
flex-direction: column;
gap: 8px;
}

.auth-label {
font-size: 11px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(--muted);
font-family: var(--mono);
}

.auth-input {
background: var(--surface);
border: 1.5px solid var(--border);
border-radius: var(--radius-sm);
color: var(--text);
font-family: var(--mono);
font-size: 15px;
padding: 14px 16px;
outline: none;
width: 100%;
transition: border-color 0.2s;
-webkit-appearance: none;
}

.auth-input:focus { border-color: var(--accent); }

.auth-btn {
background: var(--accent);
color: #000;
border: none;
border-radius: var(--radius-sm);
padding: 15px;
font-family: var(--sans);
font-size: 15px;
font-weight: 700;
cursor: pointer;
width: 100%;
transition: opacity 0.2s;
letter-spacing: 0.3px;
}

.auth-btn:active { opacity: 0.8; }
.auth-error { font-size: 12px; color: var(--red); font-family: var(--mono); min-height: 16px; }

/* ── App Layout ──────────────────────────────────── */
#app {
display: flex;
flex-direction: column;
height: 100%;
height: 100dvh;
max-width: 800px;
margin: 0 auto;
}

/* ── Header ──────────────────────────────────────── */
header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 16px;
padding-top: calc(12px + var(--safe-top));
background: var(--surface);
border-bottom: 1px solid var(--border);
flex-shrink: 0;
gap: 12px;
}

.header-left {
display: flex;
align-items: center;
gap: 10px;
min-width: 0;
}

.logo-icon {
width: 34px;
height: 34px;
background: var(--accent);
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-family: var(--mono);
font-weight: 600;
font-size: 14px;
color: #000;
flex-shrink: 0;
}

.logo-name {
font-family: var(--mono);
font-size: 16px;
font-weight: 600;
letter-spacing: -0.3px;
}

.status-pill {
display: flex;
align-items: center;
gap: 5px;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 20px;
padding: 4px 10px;
font-size: 11px;
font-family: var(--mono);
color: var(--muted);
white-space: nowrap;
}

.status-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(--muted);
flex-shrink: 0;
transition: all 0.3s;
}

.status-dot.on {
background: var(--accent);
box-shadow: 0 0 6px var(--accent);
animation: blink 2s infinite;
}

.status-dot.err { background: var(--red); }

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

.header-right {
display: flex;
align-items: center;
gap: 8px;
flex-shrink: 0;
}

.icon-btn {
width: 34px;
height: 34px;
border-radius: 8px;
background: var(--surface2);
border: 1px solid var(--border);
color: var(--muted);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
font-size: 15px;
transition: all 0.15s;
flex-shrink: 0;
}

.icon-btn:active { background: var(--border); transform: scale(0.93); }
.icon-btn.connect { color: var(--accent); border-color: var(--accent); }
.icon-btn.reset { color: var(--red); border-color: transparent; }

/* ── Mode Bar ────────────────────────────────────── */
.mode-bar {
display: flex;
background: var(--surface);
border-bottom: 1px solid var(--border);
flex-shrink: 0;
padding: 0 16px;
gap: 4px;
}

.mode-btn {
flex: 1;
max-width: 120px;
padding: 9px 12px;
font-size: 12px;
font-family: var(--mono);
color: var(--muted);
background: none;
border: none;
border-bottom: 2px solid transparent;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
text-align: center;
}

.mode-btn.active {
color: var(--accent);
border-bottom-color: var(--accent);
}

/* ── Agent Toggle ────────────────────────────────── */
.agent-toggle {
margin-left: auto;
display: flex;
align-items: center;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 20px;
padding: 2px;
gap: 2px;
align-self: center;
}

.agent-opt {
padding: 4px 10px;
font-size: 11px;
font-family: var(--mono);
color: var(--muted);
background: none;
border: none;
border-radius: 16px;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}

.agent-opt.active {
background: var(--accent);
color: #000;
font-weight: 600;
}

.agent-opt:disabled {
opacity: 0.3;
cursor: not-allowed;
}

/* ── Messages ────────────────────────────────────── */
#messages {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
padding: 16px;
display: flex;
flex-direction: column;
gap: 12px;
-webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
}

#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Message bubbles */
.msg {
display: flex;
flex-direction: column;
gap: 4px;
max-width: 88%;
animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
from { opacity: 0; transform: translateY(10px) scale(0.96); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg.you { align-self: flex-end; align-items: flex-end; }
.msg.agent, .msg.cmd, .msg.system, .msg.error { align-self: flex-start; align-items: flex-start; }

.msg-bubble {
padding: 10px 14px;
border-radius: var(--radius);
font-size: 14px;
line-height: 1.6;
word-break: break-word;
white-space: pre-wrap;
}

.msg.you .msg-bubble {
background: var(--blue);
color: #fff;
border-bottom-right-radius: 4px;
}

.msg.agent .msg-bubble {
background: var(--surface2);
color: var(--text);
border-bottom-left-radius: 4px;
font-family: var(--mono);
font-size: 13px;
border: 1px solid var(--border);
}

.msg.cmd .msg-bubble {
background: var(--surface2);
color: #b0e0ff;
border-bottom-left-radius: 4px;
font-family: var(--mono);
font-size: 12px;
border: 1px solid var(--blue-dim);
}

.msg.system .msg-bubble {
background: transparent;
color: var(--muted);
font-size: 12px;
font-family: var(--mono);
text-align: center;
border: 1px dashed var(--border);
border-radius: var(--radius-sm);
padding: 6px 12px;
}

.msg.error .msg-bubble {
background: rgba(255,82,82,0.1);
color: var(--red);
border: 1px solid rgba(255,82,82,0.2);
font-family: var(--mono);
font-size: 13px;
border-bottom-left-radius: 4px;
}

.msg.thinking .msg-bubble {
background: var(--surface2);
color: var(--muted);
border: 1px solid var(--border);
font-family: var(--mono);
font-size: 13px;
border-bottom-left-radius: 4px;
}

.msg-time {
font-size: 10px;
color: var(--muted);
font-family: var(--mono);
padding: 0 4px;
}

/* Typing indicator */
.typing-dots {
display: inline-flex;
gap: 3px;
align-items: center;
padding: 2px 0;
}

.typing-dots span {
width: 5px;
height: 5px;
border-radius: 50%;
background: var(--muted);
animation: typing 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
30% { transform: translateY(-4px); opacity: 1; }
}

/* ── Quick Commands ──────────────────────────────── */
.quick-row {
flex-shrink: 0;
padding: 8px 16px 4px;
overflow-x: auto;
display: flex;
gap: 8px;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}

.quick-row::-webkit-scrollbar { display: none; }

.quick-chip {
flex-shrink: 0;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 20px;
padding: 6px 14px;
font-size: 12px;
font-family: var(--mono);
color: var(--muted);
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
}

.quick-chip:active {
background: var(--accent-dim);
border-color: var(--accent);
color: var(--accent);
transform: scale(0.95);
}

/* ── Input Area ──────────────────────────────────── */
.input-area {
flex-shrink: 0;
padding: 8px 16px;
padding-bottom: calc(10px + var(--safe-bottom));
background: var(--surface);
border-top: 1px solid var(--border);
display: flex;
align-items: flex-end;
gap: 10px;
}

.input-wrap {
flex: 1;
background: var(--surface2);
border: 1.5px solid var(--border);
border-radius: 22px;
display: flex;
align-items: flex-end;
padding: 10px 16px;
transition: border-color 0.2s;
min-height: 44px;
}

.input-wrap:focus-within { border-color: var(--accent); }

textarea {
flex: 1;
background: none;
border: none;
outline: none;
color: var(--text);
font-family: var(--sans);
font-size: 15px;
line-height: 1.4;
resize: none;
max-height: 100px;
min-height: 22px;
-webkit-appearance: none;
}

textarea::placeholder { color: var(--muted); }

.send-btn {
width: 44px;
height: 44px;
border-radius: 50%;
background: var(--accent);
border: none;
color: #000;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: all 0.15s;
}

.send-btn:active { transform: scale(0.9); opacity: 0.8; }
.send-btn:disabled { background: var(--border); color: var(--muted); }

/* ── Screen Sessions ─────────────────────────────── */
#screenView { display: none; flex-direction: column; flex: 1; min-height: 0; }
#screenView.active { display: flex; }

#screenSessionList {
  flex: 1; overflow-y: auto; padding: 16px; display: flex;
  flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch;
}
#screenSessionList::-webkit-scrollbar { width: 3px; }
#screenSessionList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.screen-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; gap: 12px; color: var(--muted);
  font-family: var(--mono); font-size: 13px; text-align: center; padding: 40px 20px;
}

.screen-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; gap: 12px;
  animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.screen-card:active { background: var(--surface2); transform: scale(0.98); border-color: var(--accent); }

.screen-indicator { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.screen-indicator.attached { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.screen-indicator.detached { background: #ff9800; box-shadow: 0 0 8px #ff9800; }

.screen-info { flex: 1; min-width: 0; }
.screen-name { font-family: var(--mono); font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.screen-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; }
.screen-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

/* Screen terminal view — full screen overlay */
#screenTermView {
  display: none; position: fixed; inset: 0; z-index: 50;
  flex-direction: column; background: var(--bg);
}
#screenTermView.active { display: flex; }

.screen-term-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; padding-top: calc(10px + var(--safe-top));
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.screen-back-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
  font-size: 16px; cursor: pointer; padding: 8px 12px; font-family: var(--mono);
  border-radius: 8px; display: flex; align-items: center; gap: 6px;
  font-weight: 600; white-space: nowrap;
}
.screen-back-btn:active { opacity: 0.6; transform: scale(0.95); }
.screen-term-name {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.screen-term-status { font-family: var(--mono); font-size: 11px; white-space: nowrap; }

#screenTermContainer {
  flex: 1; min-height: 0; padding: 4px; background: #0d0d0d; overflow: hidden;
}

.screen-input-area {
  flex-shrink: 0; padding: 8px 12px;
  padding-bottom: calc(10px + var(--safe-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 8px;
}
.screen-input-area .input-wrap {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 22px; display: flex; align-items: flex-end;
  padding: 10px 16px; min-height: 44px;
}
.screen-input-area .input-wrap:focus-within { border-color: var(--accent); }
.screen-input-area textarea {
  flex: 1; background: none; border: none; outline: none; color: var(--text);
  font-family: var(--mono); font-size: 15px; line-height: 1.4; resize: none;
  max-height: 100px; min-height: 22px; -webkit-appearance: none;
}
.screen-input-area textarea::placeholder { color: var(--muted); }
.screen-input-area .send-btn {
  width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
  border: none; color: #000; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.screen-input-area .send-btn:active { transform: scale(0.9); opacity: 0.8; }

/* ── Desktop adjustments ─────────────────────────── */
@media (min-width: 600px) {
#app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
header { padding: 14px 20px; }
#messages { padding: 20px; gap: 14px; }
.msg { max-width: 75%; }
.input-area { padding: 12px 20px; }
.msg-bubble { font-size: 14px; }
.quick-row { padding: 8px 20px 4px; }
}

@media (min-width: 900px) {
body { background: #080808; }
#app { max-width: 680px; }
}
</style>

</head>
<body>

<!-- Auth -->

<div id="auth">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">t_</div>
      <div class="auth-logo-text">ter<span>mi</span></div>
    </div>
    <div class="auth-subtitle">Enter your access token to connect to the remote agent.</div>
    <div class="auth-field">
      <div class="auth-label">Access Token</div>
      <input type="password" class="auth-input" id="tokenInput" placeholder="••••••••••••" autocomplete="current-password" />
      <div class="auth-error" id="authError"></div>
    </div>
    <button class="auth-btn" onclick="authenticate()">Connect →</button>
  </div>
</div>

<!-- App -->

<div id="app">
  <header>
    <div class="header-left">
      <div class="logo-icon">t_</div>
      <div class="logo-name">termi</div>
    </div>
    <div class="status-pill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">offline</span>
    </div>
    <div class="header-right">
      <button class="icon-btn reset" onclick="resetSession()" title="Reset session">↺</button>
      <button class="icon-btn connect" id="connectBtn" onclick="connect()" title="Connect">⚡</button>
    </div>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" id="tab-chat" onclick="setMode('chat')">💬 chat</button>
    <button class="mode-btn" id="tab-screens" onclick="setMode('screens')">🖥 screens</button>
    <div class="agent-toggle" id="agentToggle">
      <button class="agent-opt active" id="opt-agent" onclick="switchAgent('agent')" title="Cursor Agent">cursor</button>
      <button class="agent-opt" id="opt-claude" onclick="switchAgent('claude')" title="Claude Code">claude</button>
    </div>
  </div>

  <div id="messages">
    <div class="msg system">
      <div class="msg-bubble">tap ⚡ to connect to your agent</div>
    </div>
  </div>

  <div class="quick-row" id="quickRow">
    <div class="quick-chip" onclick="quick('worker status')">worker status</div>
    <div class="quick-chip" onclick="quick('server status')">server status</div>
    <div class="quick-chip" onclick="quick('show running processes')">processes</div>
    <div class="quick-chip" onclick="quick('disk usage')">disk usage</div>
    <div class="quick-chip" onclick="quick('show recent logs')">logs</div>
    <div class="quick-chip" onclick="quick('git status')">git status</div>
    <div class="quick-chip" onclick="quick('deploy latest changes')">deploy</div>
  </div>

  <!-- Screen Session List -->
  <div id="screenView">
    <div id="screenSessionList">
      <div class="screen-empty">🖥 loading sessions...</div>
    </div>
  </div>

  <div class="input-area" id="mainInputArea">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Message your agent..."
        rows="1"
        onkeydown="onKey(event)"
        oninput="resize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()" disabled>↑</button>
  </div>
</div>

<!-- Screen Terminal View — full screen overlay -->
<div id="screenTermView">
  <div class="screen-term-header">
    <button class="screen-back-btn" onclick="screenGoBack()">&#8592; Back</button>
    <div class="screen-term-name" id="screenTermName"></div>
    <div class="screen-term-status" id="screenTermStatus"></div>
  </div>
  <div id="screenTermContainer"></div>
  <div class="screen-input-area">
    <div class="input-wrap">
      <textarea
        id="screenInput"
        placeholder="Send message to session..."
        rows="1"
        onkeydown="onScreenKey(event)"
        oninput="resize(this)"
      ></textarea>
    </div>
    <button class="send-btn" onclick="screenSend()">&#8593;</button>
  </div>
</div>

<script>
  let socket = null;
  let token = '';
  let mode = 'chat';
  let connected = false;
  let thinkingEl = null;
  let activeAgent = 'agent'; // 'agent' | 'claude'

  let lastThinkingContent = '';

  // Screen session state
  let screenTerm = null;
  let screenFitAddon = null;
  let currentScreenSession = null;
  let screenRefreshInterval = null;

  // ── Auth ──────────────────────────────────────────
  function authenticate() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) { document.getElementById('authError').textContent = 'Token required'; return; }
    token = t;
    localStorage.setItem('termi_token', t);
    document.getElementById('auth').style.display = 'none';
    initSocket();
  }

  // ── Socket ────────────────────────────────────────
  function initSocket() {
    socket = io({ auth: { token } });

    socket.on('connect_error', () => {
      document.getElementById('auth').style.display = 'flex';
      document.getElementById('authError').textContent = 'Invalid token';
    });

    socket.on('status', ({ connected: c, message, agentType, agentAvail, claudeAvail }) => {
      connected = c;
      setStatus(c ? 'on' : 'err', c ? 'online' : 'offline');
      addMsg('system', message);
      if (c) {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('connectBtn').textContent = '✓';
        if (agentType) setAgentUI(agentType);
        // Disable unavailable options
        if (agentAvail === false) document.getElementById('opt-agent').disabled = true;
        if (claudeAvail === false) document.getElementById('opt-claude').disabled = true;
      }
    });

    socket.on('agentSwitched', ({ agentType }) => {
      activeAgent = agentType;
      setAgentUI(agentType);
    });

    socket.on('response', ({ type, content }) => {
      if (type === 'thinking') {
        lastThinkingContent = content || '';
        if (thinkingEl) {
          thinkingEl.querySelector('.msg-bubble').textContent = lastThinkingContent;
        } else {
          thinkingEl = addMsg('thinking', '');
          thinkingEl.querySelector('.msg-bubble').innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        }
      } else {
        // Use thinking content as fallback if final content is empty
        const finalContent = (content && content.trim()) ? content : lastThinkingContent;
        if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
        lastThinkingContent = '';
        if (finalContent) addMsg(type, finalContent);
      }
    });

    // ── Screen session events ──────────────────────
    socket.on('screen:list', ({ sessions }) => {
      renderScreenSessions(sessions);
    });

    socket.on('screen:output', ({ data }) => {
      if (!screenTerm) return;
      screenTerm.write(data);
    });

    socket.on('screen:exit', ({ sessionName }) => {
      console.log('[screen] session exited:', sessionName);
      if (currentScreenSession === sessionName) screenGoBack();
    });

    socket.on('screen:error', ({ message }) => {
      console.error('[screen error]', message);
    });
  }

  function connect() {
    if (!socket || connected) return;
    socket.emit('init');
  }

  function resetSession() {
    if (!socket) return;
    socket.emit('reset');
    addMsg('system', 'Session reset — starting fresh');
  }

  // ── Messages ──────────────────────────────────────
  function addMsg(type, content) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    const typeMap = { you: 'you', agent: 'agent', cmd: 'cmd', command: 'cmd', error: 'error', system: 'system', thinking: 'thinking' };
    div.className = `msg ${typeMap[type] || 'system'}`;

    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="msg-bubble">${escHtml(content)}</div>
      ${type !== 'system' ? `<div class="msg-time">${time}</div>` : ''}
    `;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return div;
  }

  // ── Send ──────────────────────────────────────────
  function send() {
    const el = document.getElementById('input');
    const msg = el.value.trim();
    if (!msg || !connected) return;
    addMsg('you', msg);
    el.value = '';
    resize(el);

    socket.emit('chat', { message: msg });
  }

  function quick(cmd) {
    document.getElementById('input').value = cmd;
    send();
  }

  // ── Mode ──────────────────────────────────────────
  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${m}`).classList.add('active');

    // Toggle visibility of views
    const messages = document.getElementById('messages');
    const quickRow = document.getElementById('quickRow');
    const mainInput = document.getElementById('mainInputArea');
    const screenView = document.getElementById('screenView');
    const screenTermView = document.getElementById('screenTermView');

    if (m === 'screens') {
      messages.style.display = 'none';
      quickRow.style.display = 'none';
      mainInput.style.display = 'none';
      if (currentScreenSession) {
        screenView.classList.remove('active');
        screenTermView.classList.add('active');
      } else {
        screenView.classList.add('active');
        screenTermView.classList.remove('active');
        loadScreenSessions();
        startScreenRefresh();
      }
    } else {
      messages.style.display = 'flex';
      quickRow.style.display = 'flex';
      mainInput.style.display = 'flex';
      screenView.classList.remove('active');
      screenTermView.classList.remove('active');
      stopScreenRefresh();
      const el = document.getElementById('input');
      el.placeholder = m === 'chat' ? 'Message your agent...' : 'ls -la, ps aux, cat file...';
    }
  }

  // ── Screen Sessions ──────────────────────────────
  function loadScreenSessions() {
    if (socket && connected) socket.emit('screen:list');
  }

  function startScreenRefresh() {
    stopScreenRefresh();
    screenRefreshInterval = setInterval(() => {
      if (!currentScreenSession) loadScreenSessions();
    }, 10000);
  }

  function stopScreenRefresh() {
    if (screenRefreshInterval) { clearInterval(screenRefreshInterval); screenRefreshInterval = null; }
  }

  function renderScreenSessions(sessions) {
    const el = document.getElementById('screenSessionList');
    if (currentScreenSession) return;

    if (sessions.length === 0) {
      el.innerHTML = '<div class="screen-empty">No screen sessions running<br><span style="font-size:11px;color:var(--muted)">Start one with: screen -S mySession</span></div>';
      return;
    }

    el.innerHTML = sessions.map(s => `
      <div class="screen-card" onclick="screenJoin('${escAttr(s.fullName)}','${escAttr(s.name)}','${s.status}')">
        <div class="screen-indicator ${s.status}"></div>
        <div class="screen-info">
          <div class="screen-name">${escHtml(s.name)}</div>
          <div class="screen-meta"><span>PID ${s.pid}</span><span>${s.status}</span></div>
        </div>
        <div class="screen-arrow">&#8250;</div>
      </div>
    `).join('');
  }

  function escAttr(t) {
    return String(t).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function screenJoin(fullName, name, status) {
    currentScreenSession = fullName;

    // Show full-screen terminal overlay
    document.getElementById('screenTermView').classList.add('active');
    document.getElementById('screenTermName').textContent = name;
    document.getElementById('screenTermStatus').textContent = status === 'attached' ? '● live' : '○ detached';
    document.getElementById('screenTermStatus').style.color = status === 'attached' ? 'var(--accent)' : '#ff9800';

    initScreenTerminal();

    // Join with terminal dimensions
    const cols = screenTerm ? screenTerm.cols : 80;
    const rows = screenTerm ? screenTerm.rows : 24;
    socket.emit('screen:join', { sessionName: fullName, cols, rows });

    // Focus input after terminal renders
    setTimeout(() => { document.getElementById('screenInput').focus(); }, 400);
  }

  function screenGoBack() {
    if (!currentScreenSession) return;
    socket.emit('screen:leave', { sessionName: currentScreenSession });
    currentScreenSession = null;

    // Dispose terminal
    if (screenTerm) {
      window.removeEventListener('resize', handleScreenResize);
      screenTerm.dispose();
      screenTerm = null;
      screenFitAddon = null;
    }

    // Hide overlay
    document.getElementById('screenTermView').classList.remove('active');

    // Refresh session list
    loadScreenSessions();
  }

  function initScreenTerminal() {
    const container = document.getElementById('screenTermContainer');
    container.innerHTML = '';
    screenTerm = new Terminal({
      cursorBlink: true, cursorStyle: 'block',
      fontSize: 12, fontFamily: 'IBM Plex Mono, monospace',
      theme: {
        background: '#0d0d0d', foreground: '#ececec', cursor: '#ececec',
        selectionBackground: '#448aff44',
        black: '#0d0d0d', red: '#ff5252', green: '#00e676', yellow: '#ff9800',
        blue: '#448aff', magenta: '#e040fb', cyan: '#18ffff', white: '#ececec',
        brightBlack: '#666666', brightRed: '#ff8a80', brightGreen: '#69f0ae',
        brightYellow: '#ffd740', brightBlue: '#82b1ff', brightMagenta: '#ea80fc',
        brightCyan: '#84ffff', brightWhite: '#ffffff',
      },
      scrollback: 5000,
    });
    screenFitAddon = new FitAddon.FitAddon();
    screenTerm.loadAddon(screenFitAddon);
    screenTerm.open(container);

    // Pipe keyboard input to server PTY
    screenTerm.onData((data) => {
      if (socket && currentScreenSession) {
        socket.emit('screen:input', { sessionName: currentScreenSession, data });
      }
    });

    // Fit after layout settles
    setTimeout(() => { screenFitAddon.fit(); }, 100);
    setTimeout(() => { screenFitAddon.fit(); }, 300);
    window.addEventListener('resize', handleScreenResize);
  }

  function handleScreenResize() {
    if (screenFitAddon && screenTerm) {
      screenFitAddon.fit();
      // Notify server of new size
      if (socket && currentScreenSession) {
        socket.emit('screen:resize', {
          sessionName: currentScreenSession,
          cols: screenTerm.cols, rows: screenTerm.rows
        });
      }
    }
  }

  function screenSend() {
    const el = document.getElementById('screenInput');
    const msg = el.value;
    if (!msg || !connected || !currentScreenSession) return;
    // Send via PTY with newline
    socket.emit('screen:input', { sessionName: currentScreenSession, data: msg + '\r' });
    el.value = '';
    resize(el);
    el.focus();
  }

  function onScreenKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      screenSend();
    }
  }

  // ── Agent switcher ────────────────────────────────
  function switchAgent(type) {
    if (!socket || !connected || type === activeAgent) return;
    socket.emit('setAgent', { type });
  }

  function setAgentUI(type) {
    activeAgent = type;
    document.querySelectorAll('.agent-opt').forEach(b => b.classList.remove('active'));
    document.getElementById(`opt-${type}`).classList.add('active');
  }

  // ── Utils ─────────────────────────────────────────
  function setStatus(state, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (state === 'on' ? ' on' : state === 'err' ? ' err' : '');
    document.getElementById('statusText').textContent = text;
  }

  function onKey(e) {
    // Desktop: Enter sends, Shift+Enter newline
    // Mobile: always newline on Enter (keyboard submit button handles send)
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (!isMobile && e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function escHtml(t) {
    return String(t)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  // ── Init ──────────────────────────────────────────
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('termi_token');
    if (saved) {
      token = saved;
      document.getElementById('auth').style.display = 'none';
      initSocket();
    }
    document.getElementById('tokenInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') authenticate();
    });
    // Enable send button on input
    document.getElementById('input').addEventListener('input', () => {
      document.getElementById('sendBtn').disabled = !connected;
    });
  });
</script>

</body>
</html>
