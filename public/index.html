<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0f">
<link rel="manifest" href="/manifest.json">
<title>termi</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0b0b0f;
    --bg2:        #0e0e14;
    --surface:    #13131a;
    --surface2:   #1a1a24;
    --surface3:   #22222e;
    --border:     #1f1f2e;
    --border-hi:  #2d2d3f;
    --green:      #22dd88;
    --green-dim:  rgba(34,221,136,0.08);
    --green-mid:  rgba(34,221,136,0.15);
    --green-glow: rgba(34,221,136,0.25);
    --blue:       #6ba1ff;
    --blue-dim:   rgba(107,161,255,0.08);
    --red:        #ff6b6b;
    --red-dim:    rgba(255,107,107,0.08);
    --orange:     #ffb347;
    --orange-dim: rgba(255,179,71,0.08);
    --purple:     #c084fc;
    --cyan:       #22d3ee;
    --text:       #e8e8ef;
    --text2:      #a0a0b8;
    --dim:        #555568;
    --mono:       'JetBrains Mono', 'SF Mono', monospace;
    --sans:       'Inter', -apple-system, sans-serif;
    --r:          14px;
    --r-sm:       10px;
    --r-lg:       18px;
    --safe-b:     env(safe-area-inset-bottom, 0px);
    --safe-t:     env(safe-area-inset-top, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; height: 100dvh; background: var(--bg); color: var(--text);
    font-family: var(--sans); overflow: hidden;
    -webkit-font-smoothing: antialiased; touch-action: manipulation;
  }

  /* ── Splash ─────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; z-index: 200; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px; transition: opacity 0.5s;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  .splash-icon {
    width: 80px; height: 80px; border-radius: 22px;
    background: linear-gradient(135deg, #22dd88, #1aaf6a);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 32px; color: #000;
    box-shadow: 0 0 60px var(--green-glow), 0 0 120px var(--green-dim);
    animation: sPulse 2s ease-in-out infinite;
  }
  @keyframes sPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .splash-label { font-family: var(--mono); font-size: 13px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }
  .splash-bar { width: 120px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .splash-bar-fill { width: 40%; height: 100%; background: var(--green); border-radius: 2px; animation: sBar 1.5s ease infinite; }
  @keyframes sBar { 0% { width: 10%; margin-left: 0; } 50% { width: 50%; margin-left: 25%; } 100% { width: 10%; margin-left: 90%; } }

  /* ── Toast ──────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(12px);
    z-index: 160; padding: 10px 20px; background: var(--surface3);
    border: 1px solid var(--border-hi); border-radius: 12px;
    font-family: var(--mono); font-size: 12px; color: var(--green);
    opacity: 0; pointer-events: none; transition: all 0.25s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Reconnect ──────────────────────────────────── */
  #reconnectBanner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 150;
    padding: 8px 16px; padding-top: calc(8px + var(--safe-t));
    background: var(--red); color: #fff; font-family: var(--mono);
    font-size: 11px; font-weight: 600; text-align: center;
    display: none; animation: slideD 0.3s;
  }
  #reconnectBanner.visible { display: block; }
  @keyframes slideD { from { transform: translateY(-100%); } to { transform: translateY(0); } }

  /* ── Auth ────────────────────────────────────────── */
  #auth {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  .auth-card {
    width: 100%; max-width: 380px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 32px 28px;
    display: flex; flex-direction: column; gap: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .auth-head { display: flex; align-items: center; gap: 12px; }
  .auth-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #22dd88, #1aaf6a);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 18px; color: #000;
  }
  .auth-title { font-family: var(--mono); font-size: 20px; font-weight: 600; }
  .auth-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .auth-field { display: flex; flex-direction: column; gap: 6px; }
  .auth-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); }
  .auth-input {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: var(--r-sm); color: var(--text);
    font-family: var(--mono); font-size: 14px; padding: 12px 14px;
    outline: none; width: 100%; transition: all 0.2s;
  }
  .auth-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-dim); }
  .auth-btn {
    background: linear-gradient(135deg, #22dd88, #1aaf6a);
    color: #000; border: none; border-radius: var(--r-sm);
    padding: 13px; font-family: var(--mono); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
  }
  .auth-btn:active { transform: scale(0.98); opacity: 0.9; }
  .auth-error { font-family: var(--mono); font-size: 11px; color: var(--red); min-height: 14px; }

  /* ── App ─────────────────────────────────────────── */
  #app {
    display: flex; flex-direction: column;
    height: 100%; height: 100dvh; max-width: 800px; margin: 0 auto;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    display: flex; align-items: center; padding: 10px 14px;
    padding-top: calc(10px + var(--safe-t));
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 10px;
  }
  .h-logo {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, #22dd88, #1aaf6a);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 13px; color: #000;
    flex-shrink: 0;
  }
  .h-name { font-family: var(--mono); font-size: 15px; font-weight: 600; flex: 1; }
  .h-status {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px 4px 8px;
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .h-status:active { background: var(--surface3); }
  .h-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--dim);
    transition: all 0.3s;
  }
  .h-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
  .h-dot.err { background: var(--red); }
  .h-latency { font-size: 10px; color: var(--dim); }

  /* Header menu */
  .h-menu { position: relative; }
  .h-btn {
    width: 32px; height: 32px; border-radius: 8px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.1s; font-family: var(--mono);
  }
  .h-btn:active { background: var(--surface3); transform: scale(0.92); }
  .h-drop {
    display: none; position: absolute; right: 0; top: calc(100% + 6px);
    background: var(--surface2); border: 1px solid var(--border-hi);
    border-radius: var(--r-sm); overflow: hidden; z-index: 80;
    min-width: 170px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .h-drop.open { display: block; animation: dropIn 0.15s; }
  @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .h-drop-item {
    padding: 10px 14px; font-family: var(--mono); font-size: 11px;
    color: var(--text2); cursor: pointer; background: none; border: none;
    width: 100%; text-align: left; transition: background 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .h-drop-item:active { background: var(--surface3); }
  .h-drop-item.red { color: var(--red); }
  .h-drop-sep { height: 1px; background: var(--border); margin: 2px 0; }

  /* ── Tabs ────────────────────────────────────────── */
  .tabs {
    display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; padding: 0 14px;
  }
  .tab {
    padding: 10px 16px; font-family: var(--mono); font-size: 12px; font-weight: 500;
    color: var(--dim); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    transition: all 0.15s; position: relative;
  }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab:active { opacity: 0.7; }
  .tab-dot {
    position: absolute; top: 6px; right: 6px;
    width: 5px; height: 5px; border-radius: 50%; background: var(--orange);
    display: none;
  }
  .tab-dot.on { display: block; }

  .agent-bar {
    margin-left: auto; display: flex; align-items: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px; align-self: center;
  }
  .agent-btn {
    padding: 4px 10px; font-family: var(--mono); font-size: 10px; font-weight: 500;
    color: var(--dim); background: none; border: none; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
  }
  .agent-btn.active { background: var(--green); color: #000; font-weight: 700; }
  .agent-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Queue ──────────────────────────────────────── */
  .queue-bar {
    flex-shrink: 0; padding: 6px 14px; background: var(--green-dim);
    border-bottom: 1px solid rgba(34,221,136,0.1);
    font-family: var(--mono); font-size: 11px; color: var(--green);
    display: none; align-items: center; gap: 8px;
  }
  .queue-bar.on { display: flex; }
  .queue-n {
    background: var(--green); color: #000; border-radius: 4px;
    padding: 0 6px; font-weight: 700; font-size: 10px;
  }

  /* ── Messages ───────────────────────────────────── */
  #messages {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 14px; display: flex; flex-direction: column; gap: 6px;
    -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Command block (Warp-style: input + output grouped) */
  .cmd-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); overflow: hidden;
    animation: blockIn 0.2s ease;
    margin-bottom: 4px;
  }
  @keyframes blockIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .cmd-input {
    padding: 10px 14px; display: flex; align-items: flex-start; gap: 8px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .cmd-prompt { color: var(--green); font-family: var(--mono); font-size: 13px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
  .cmd-text { font-family: var(--mono); font-size: 13px; color: var(--text); word-break: break-word; line-height: 1.5; }
  .cmd-time { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-left: auto; flex-shrink: 0; padding-top: 2px; }

  .cmd-output {
    padding: 12px 14px; font-family: var(--mono); font-size: 12px;
    color: var(--text2); line-height: 1.65; word-break: break-word;
    white-space: pre-wrap; position: relative;
  }
  .cmd-output.collapsed { max-height: 180px; overflow: hidden; }
  .cmd-output.collapsed::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 50px; background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .cmd-output .copy-btn {
    position: absolute; top: 8px; right: 8px;
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; cursor: pointer;
    font-family: var(--mono); font-size: 10px; color: var(--dim);
    opacity: 0; transition: opacity 0.15s;
  }
  .cmd-output:hover .copy-btn { opacity: 1; }
  .cmd-output .copy-btn:active { background: var(--green); color: #000; border-color: var(--green); }

  .cmd-expand {
    padding: 0 14px 8px; font-family: var(--mono); font-size: 11px;
    color: var(--blue); cursor: pointer; background: var(--surface);
  }
  .cmd-expand:active { color: var(--green); }

  .cmd-footer {
    padding: 4px 14px 6px; display: flex; align-items: center; gap: 8px;
    background: var(--surface);
  }
  .cmd-status {
    font-family: var(--mono); font-size: 10px; display: flex; align-items: center; gap: 4px;
  }
  .cmd-status.ok { color: var(--green); }
  .cmd-status.err { color: var(--red); }

  /* Standalone messages (system, errors without input) */
  .sys-line {
    font-family: var(--mono); font-size: 11px; color: var(--dim);
    padding: 4px 8px; text-align: center;
    animation: blockIn 0.2s ease;
  }

  .err-block {
    background: var(--red-dim); border: 1px solid rgba(255,107,107,0.15);
    border-radius: var(--r-sm); padding: 10px 14px;
    font-family: var(--mono); font-size: 12px; color: var(--red);
    line-height: 1.6; word-break: break-word; white-space: pre-wrap;
    animation: blockIn 0.2s ease;
  }

  /* Thinking state */
  .thinking-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px; overflow: hidden;
    position: relative; animation: blockIn 0.2s ease;
  }
  .thinking-block::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--green), var(--blue), var(--purple), var(--green));
    background-size: 300% 100%; animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
  .thinking-block .cmd-output { padding-top: 6px; }

  .typing-dots { display: inline-flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    animation: tDot 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes tDot { 0%,70%,100% { opacity: 0.2; transform: scale(0.8); } 35% { opacity: 1; transform: scale(1.1); } }

  /* Welcome */
  .welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 20px; padding: 32px 20px; text-align: center;
  }
  .welcome-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px 20px; display: flex;
    flex-direction: column; gap: 8px; width: 100%; max-width: 320px;
  }
  .welcome-top { font-family: var(--mono); font-size: 13px; color: var(--green); }
  .welcome-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .welcome-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px;
  }
  .wg-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 10px 12px; cursor: pointer;
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    transition: all 0.15s; text-align: left; display: flex; align-items: center; gap: 6px;
  }
  .wg-btn:active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .wg-icon { font-size: 13px; }

  /* ── Quick Commands ─────────────────────────────── */
  .quickbar {
    flex-shrink: 0; padding: 6px 14px;
    overflow-x: auto; display: flex; gap: 6px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  .quickbar::-webkit-scrollbar { display: none; }
  .q-btn {
    flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-family: var(--mono); font-size: 11px;
    color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .q-btn:active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  /* ── Input (Warp-style prompt) ──────────────────── */
  .prompt-bar {
    flex-shrink: 0; padding: 10px 14px;
    padding-bottom: calc(10px + var(--safe-b));
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 10px;
  }
  .prompt-wrap {
    flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--r); display: flex; align-items: flex-end;
    padding: 10px 14px; gap: 8px; transition: all 0.2s; min-height: 44px;
  }
  .prompt-wrap:focus-within { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-dim); }
  .prompt-chevron { color: var(--green); font-family: var(--mono); font-size: 14px; font-weight: 700; flex-shrink: 0; padding-bottom: 1px; }
  .prompt-ta {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-family: var(--mono); font-size: 14px; line-height: 1.4;
    resize: none; max-height: 100px; min-height: 20px;
    caret-color: var(--green); -webkit-appearance: none;
  }
  .prompt-ta::placeholder { color: var(--dim); }
  .prompt-send {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #22dd88, #1aaf6a);
    border: none; color: #000; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; font-family: var(--mono);
  }
  .prompt-send:active { transform: scale(0.9); }
  .prompt-send:disabled { background: var(--surface3); color: var(--dim); }

  /* ── Screens ────────────────────────────────────── */
  #screenView { display: none; flex-direction: column; flex: 1; min-height: 0; }
  #screenView.active { display: flex; }

  .scr-header {
    padding: 14px 14px 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .scr-title { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .scr-count {
    background: var(--surface3); border-radius: 6px; padding: 2px 7px;
    font-size: 10px; font-weight: 700; color: var(--text2);
  }
  .scr-refresh {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; cursor: pointer; font-family: var(--mono); font-size: 12px;
    color: var(--text2); transition: all 0.15s;
  }
  .scr-refresh:active { color: var(--green); transform: rotate(90deg) scale(0.9); }

  #screenSessionList {
    flex: 1; overflow-y: auto; padding: 6px 14px 14px;
    display: flex; flex-direction: column; gap: 8px;
    -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  }
  #screenSessionList::-webkit-scrollbar { width: 3px; }
  #screenSessionList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Session cards */
  .scr-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 16px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 14px;
    animation: blockIn 0.2s ease; position: relative; overflow: hidden;
  }
  .scr-card::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .scr-card.live::after { background: var(--green); }
  .scr-card.idle::after { background: var(--orange); }
  .scr-card:active { background: var(--surface2); transform: scale(0.98); }

  .scr-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 16px; font-weight: 700; flex-shrink: 0;
  }
  .scr-icon.live { background: var(--green-dim); color: var(--green); }
  .scr-icon.idle { background: var(--orange-dim); color: var(--orange); }

  .scr-info { flex: 1; min-width: 0; }
  .scr-name {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .scr-meta {
    font-family: var(--mono); font-size: 10px; color: var(--dim);
    margin-top: 4px; display: flex; align-items: center; gap: 8px;
  }
  .scr-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 6px; border-radius: 4px; font-size: 9px;
    font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .scr-badge.live { background: var(--green-dim); color: var(--green); }
  .scr-badge.idle { background: var(--orange-dim); color: var(--orange); }

  .scr-chevron { color: var(--dim); font-size: 16px; flex-shrink: 0; transition: transform 0.1s; }
  .scr-card:active .scr-chevron { transform: translateX(3px); color: var(--green); }

  /* Empty state */
  .scr-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 16px; padding: 40px 20px; text-align: center;
  }
  .scr-empty-icon {
    width: 56px; height: 56px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 22px; color: var(--dim);
  }
  .scr-empty-text { font-family: var(--mono); font-size: 12px; color: var(--dim); line-height: 1.6; }
  .scr-empty-hint {
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
  }
  .scr-empty-hint .g { color: var(--green); }

  /* ── Screen Terminal View ───────────────────────── */
  #screenTermView {
    display: none; position: fixed; inset: 0; z-index: 50;
    flex-direction: column; background: var(--bg);
    animation: slideRight 0.2s ease;
  }
  #screenTermView.active { display: flex; }
  @keyframes slideRight { from { transform: translateX(20%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .stv-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; padding-top: calc(8px + var(--safe-t));
    background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .stv-back {
    background: var(--surface2); border: 1px solid var(--border); color: var(--green);
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 5px; transition: all 0.1s;
  }
  .stv-back:active { background: var(--green); color: #000; }
  .stv-name {
    font-family: var(--mono); font-size: 13px; font-weight: 600; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .stv-status { font-family: var(--mono); font-size: 10px; font-weight: 600; }
  .stv-status.live { color: var(--green); }
  .stv-status.idle { color: var(--orange); }

  #screenTermContainer { flex: 1; min-height: 0; padding: 2px; background: var(--bg); overflow: hidden; }

  /* ── Desktop ────────────────────────────────────── */
  @media (min-width: 600px) {
    #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    .header { padding: 12px 18px; }
    #messages { padding: 18px; }
    .prompt-bar { padding: 12px 18px; }
    .cmd-output .copy-btn { opacity: 0.5; }
  }
  @media (min-width: 900px) {
    body { background: #06060a; }
    #app { max-width: 720px; }
  }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-icon">t_</div>
  <div class="splash-label">termi</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Reconnect -->
<div id="reconnectBanner">connection lost - reconnecting...</div>

<!-- Auth -->
<div id="auth" style="display:none">
  <div class="auth-card">
    <div class="auth-head">
      <div class="auth-icon">t_</div>
      <div class="auth-title">termi</div>
    </div>
    <div class="auth-desc">Enter your access token to connect to the remote agent.</div>
    <div class="auth-field">
      <div class="auth-label">Access Token</div>
      <input type="password" class="auth-input" id="tokenInput" placeholder="paste token here" autocomplete="current-password" />
      <div class="auth-error" id="authError"></div>
    </div>
    <button class="auth-btn" onclick="authenticate()">Connect</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="h-logo">t_</div>
    <div class="h-name">termi</div>
    <div class="h-status" onclick="showLatency()">
      <span class="h-dot" id="statusDot"></span>
      <span id="statusText">connecting</span>
      <span class="h-latency" id="latencyText"></span>
    </div>
    <div class="h-menu">
      <button class="h-btn" onclick="toggleMenu()">&#8943;</button>
      <div class="h-drop" id="headerMenu">
        <button class="h-drop-item" onclick="resetSession(); closeMenu()">Reset session</button>
        <button class="h-drop-item" onclick="clearHistory(); closeMenu()">Clear history</button>
        <div class="h-drop-sep"></div>
        <button class="h-drop-item red" onclick="logout(); closeMenu()">Logout</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-chat" onclick="setMode('chat')">chat</button>
    <button class="tab" id="tab-screens" onclick="setMode('screens')">screens <span class="tab-dot" id="screenBadge"></span></button>
    <div class="agent-bar">
      <button class="agent-btn active" id="opt-agent" onclick="switchAgent('agent')">cursor</button>
      <button class="agent-btn" id="opt-claude" onclick="switchAgent('claude')">claude</button>
    </div>
  </div>

  <div class="queue-bar" id="queueBanner"><span class="queue-n" id="queueCount">0</span> tasks queued</div>

  <div id="messages">
    <div class="welcome" id="welcomeCard">
      <div class="welcome-badge">
        <div class="welcome-top">$ termi ready</div>
        <div class="welcome-sub">Your remote agent is connected. Send a command or pick one below.</div>
        <div class="welcome-grid">
          <button class="wg-btn" onclick="quick('server status')"><span class="wg-icon">&#9670;</span> status</button>
          <button class="wg-btn" onclick="quick('show running processes')"><span class="wg-icon">&#9654;</span> processes</button>
          <button class="wg-btn" onclick="quick('disk usage')"><span class="wg-icon">&#9632;</span> disk</button>
          <button class="wg-btn" onclick="quick('git status')"><span class="wg-icon">&#10132;</span> git</button>
          <button class="wg-btn" onclick="quick('show recent logs')"><span class="wg-icon">&#9776;</span> logs</button>
          <button class="wg-btn" onclick="quick('deploy latest changes')"><span class="wg-icon">&#9650;</span> deploy</button>
        </div>
      </div>
    </div>
  </div>

  <div class="quickbar" id="quickRow">
    <button class="q-btn" onclick="quick('worker status')">worker</button>
    <button class="q-btn" onclick="quick('server status')">status</button>
    <button class="q-btn" onclick="quick('show running processes')">ps</button>
    <button class="q-btn" onclick="quick('disk usage')">disk</button>
    <button class="q-btn" onclick="quick('show recent logs')">logs</button>
    <button class="q-btn" onclick="quick('git status')">git</button>
    <button class="q-btn" onclick="quick('deploy latest changes')">deploy</button>
  </div>

  <!-- Screen Sessions -->
  <div id="screenView">
    <div class="scr-header">
      <div class="scr-title">Sessions <span class="scr-count" id="screenCount">0</span></div>
      <button class="scr-refresh" onclick="refreshScreens()">&#8635;</button>
    </div>
    <div id="screenSessionList"></div>
  </div>

  <div class="prompt-bar" id="mainInputArea">
    <div class="prompt-wrap">
      <span class="prompt-chevron">&gt;</span>
      <textarea id="input" class="prompt-ta" placeholder="type a command..." rows="1"
        onkeydown="onKey(event)" oninput="resizeTA(this)"></textarea>
    </div>
    <button class="prompt-send" id="sendBtn" onclick="send()" disabled>&#8593;</button>
  </div>
</div>

<!-- Screen Terminal View -->
<div id="screenTermView">
  <div class="stv-header">
    <button class="stv-back" onclick="screenGoBack()">&#8592; back</button>
    <div class="stv-name" id="screenTermName"></div>
    <div class="stv-status" id="screenTermStatus"></div>
  </div>
  <div id="screenTermContainer"></div>
</div>

<script>
  let socket=null, token='', mode='chat', connected=false, thinkingEl=null;
  let activeAgent='agent', lastThinkingContent='', latencyMs=null, latencyInterval=null;
  let screenTerm=null, screenFitAddon=null, currentScreenSession=null, screenRefreshInterval=null;
  let swipeStartX=0, swipeStartY=0;
  let lastInputMsg = '';

  function haptic(s) { if(navigator.vibrate) navigator.vibrate(s==='light'?10:s==='medium'?20:30); }

  let toastTimer=null;
  function showToast(m) {
    const e=document.getElementById('toast'); e.textContent=m;
    e.classList.add('visible'); clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>e.classList.remove('visible'),2000);
  }

  function hideSplash() {
    const s=document.getElementById('splash'); s.classList.add('hidden');
    setTimeout(()=>s.style.display='none',600);
  }

  // Auth
  function authenticate() {
    const t=document.getElementById('tokenInput').value.trim();
    if(!t){document.getElementById('authError').textContent='Token required';return;}
    token=t; localStorage.setItem('termi_token',t);
    document.getElementById('auth').style.display='none'; haptic('medium'); initSocket();
  }
  function logout() { localStorage.removeItem('termi_token'); localStorage.removeItem('termi_history'); if(socket)socket.disconnect(); location.reload(); }

  // Menu
  function toggleMenu() { haptic('light'); document.getElementById('headerMenu').classList.toggle('open'); }
  function closeMenu() { document.getElementById('headerMenu').classList.remove('open'); }
  document.addEventListener('click',e=>{ if(!e.target.closest('.h-menu'))closeMenu(); });

  // Socket
  function initSocket() {
    socket=io({ auth:{token}, reconnection:true, reconnectionDelay:1000, reconnectionAttempts:Infinity });

    socket.on('connect',()=>{
      document.getElementById('reconnectBanner').classList.remove('visible');
      socket.emit('init'); startLatencyPing();
    });
    socket.on('disconnect',()=>{
      connected=false; setStatus('err','offline');
      document.getElementById('reconnectBanner').classList.add('visible'); stopLatencyPing();
    });
    socket.on('reconnect',()=>{
      document.getElementById('reconnectBanner').classList.remove('visible');
      socket.emit('init'); showToast('reconnected');
    });
    socket.on('connect_error',err=>{
      if(err.message==='Unauthorized'){
        hideSplash(); document.getElementById('auth').style.display='flex';
        document.getElementById('authError').textContent='Invalid token';
      }
    });
    socket.on('status',({connected:c,message,agentType,agentAvail,claudeAvail})=>{
      connected=c; hideSplash();
      setStatus(c?'on':'err',c?'online':'offline');
      addMsg('system',message);
      if(c){
        document.getElementById('sendBtn').disabled=false;
        if(agentType)setAgentUI(agentType);
        if(agentAvail===false)document.getElementById('opt-agent').disabled=true;
        if(claudeAvail===false)document.getElementById('opt-claude').disabled=true;
      }
    });
    socket.on('agentSwitched',({agentType})=>{
      activeAgent=agentType; setAgentUI(agentType);
      showToast('switched to '+(agentType==='claude'?'Claude':'Cursor'));
    });
    socket.on('response',({type,content})=>{
      if(type==='thinking'){
        lastThinkingContent=content||'';
        if(thinkingEl){
          const out=thinkingEl.querySelector('.cmd-output');
          if(out)out.textContent=lastThinkingContent;
        } else {
          thinkingEl=addMsg('thinking','');
        }
      } else {
        const finalContent=(content&&content.trim())?content:lastThinkingContent;
        if(thinkingEl){thinkingEl.remove();thinkingEl=null;}
        lastThinkingContent='';
        if(finalContent){addMsg(type,finalContent);haptic('light');}
      }
    });
    socket.on('queue',q=>{
      const b=document.getElementById('queueBanner');
      if(q.length>0){b.classList.add('on');document.getElementById('queueCount').textContent=q.length;}
      else b.classList.remove('on');
    });
    socket.on('screen:list',({sessions})=>{
      document.getElementById('screenBadge').classList.toggle('on',sessions.length>0&&mode!=='screens');
      document.getElementById('screenCount').textContent=sessions.length;
      renderScreenSessions(sessions);
    });
    socket.on('screen:output',({data})=>{if(screenTerm)screenTerm.write(data);});
    socket.on('screen:exit',({sessionName})=>{if(currentScreenSession===sessionName)screenGoBack();});
  }

  // Latency
  function startLatencyPing(){stopLatencyPing();measureLatency();latencyInterval=setInterval(measureLatency,15000);}
  function stopLatencyPing(){if(latencyInterval){clearInterval(latencyInterval);latencyInterval=null;}}
  function measureLatency(){
    if(!socket||!socket.connected)return;
    const s=Date.now();
    socket.volatile.emit('ping',null,()=>{
      latencyMs=Date.now()-s;
      document.getElementById('latencyText').textContent=latencyMs+'ms';
    });
  }
  function showLatency(){haptic('light');measureLatency();}
  function resetSession(){if(!socket)return;haptic('medium');socket.emit('reset');showToast('session reset');}

  // Messages
  function hideWelcome(){const w=document.getElementById('welcomeCard');if(w)w.style.display='none';}

  function addMsg(type,content){
    hideWelcome();
    const wrap=document.getElementById('messages');
    const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const isLong=content.length>600;
    let el;

    if(type==='you'){
      // Store input for pairing with output
      lastInputMsg=content;
      el=document.createElement('div');
      el.className='cmd-block';
      el.id='pending-block';
      el.innerHTML=`
        <div class="cmd-input">
          <span class="cmd-prompt">&gt;</span>
          <span class="cmd-text">${escHtml(content)}</span>
          <span class="cmd-time">${time}</span>
        </div>
      `;
      wrap.appendChild(el);

    } else if(type==='agent'||type==='cmd'||type==='command'){
      // Try to attach to pending block
      const pending=document.getElementById('pending-block');
      if(pending){
        pending.removeAttribute('id');
        const outDiv=document.createElement('div');
        outDiv.className='cmd-output'+(isLong?' collapsed':'');
        outDiv.innerHTML=`${escHtml(content)}<button class="copy-btn" onclick="copyOutput(this)">copy</button>`;
        pending.appendChild(outDiv);
        if(isLong){
          const exp=document.createElement('div');
          exp.className='cmd-expand';
          exp.textContent='[ show more ]';
          exp.onclick=function(){toggleExpand(outDiv,exp);};
          pending.appendChild(exp);
        }
        el=pending;
      } else {
        el=document.createElement('div');
        el.className='cmd-block';
        const outDiv=document.createElement('div');
        outDiv.className='cmd-output'+(isLong?' collapsed':'');
        outDiv.innerHTML=`${escHtml(content)}<button class="copy-btn" onclick="copyOutput(this)">copy</button>`;
        el.appendChild(outDiv);
        if(isLong){
          const exp=document.createElement('div');
          exp.className='cmd-expand';
          exp.textContent='[ show more ]';
          exp.onclick=function(){toggleExpand(outDiv,exp);};
          el.appendChild(exp);
        }
        wrap.appendChild(el);
      }

    } else if(type==='error'){
      // Remove pending block id so next output doesn't attach
      const pb=document.getElementById('pending-block');
      if(pb)pb.removeAttribute('id');
      el=document.createElement('div');
      el.className='err-block';
      el.innerHTML=escHtml(content);
      wrap.appendChild(el);

    } else if(type==='thinking'){
      el=document.createElement('div');
      el.className='thinking-block';
      el.innerHTML=`<div class="cmd-output"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      wrap.appendChild(el);

    } else {
      // system
      el=document.createElement('div');
      el.className='sys-line';
      el.textContent=content;
      wrap.appendChild(el);
    }

    wrap.scrollTop=wrap.scrollHeight;
    saveMessage(type,content);
    return el;
  }

  function copyOutput(btn){
    const out=btn.closest('.cmd-output');
    // Get text without the copy button text
    const clone=out.cloneNode(true);
    clone.querySelectorAll('.copy-btn').forEach(b=>b.remove());
    navigator.clipboard.writeText(clone.textContent.trim()).then(()=>{showToast('copied');haptic('light');});
  }

  function toggleExpand(outEl,btnEl){
    if(outEl.classList.contains('collapsed')){
      outEl.classList.remove('collapsed');
      btnEl.textContent='[ show less ]';
    } else {
      outEl.classList.add('collapsed');
      btnEl.textContent='[ show more ]';
    }
  }

  // History
  function saveMessage(type,content){
    if(type==='thinking')return;
    try{
      const h=JSON.parse(localStorage.getItem('termi_history')||'[]');
      h.push({type,content,ts:Date.now()});
      if(h.length>200)h.splice(0,h.length-200);
      localStorage.setItem('termi_history',JSON.stringify(h));
    }catch(_){}
  }

  function loadHistory(){
    try{
      const h=JSON.parse(localStorage.getItem('termi_history')||'[]');
      const recent=h.slice(-50);
      if(!recent.length)return;
      hideWelcome();
      const wrap=document.getElementById('messages');
      let pendingBlock=null;
      recent.forEach(m=>{
        const time=new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        if(m.type==='you'){
          pendingBlock=document.createElement('div');
          pendingBlock.className='cmd-block';
          pendingBlock.innerHTML=`<div class="cmd-input"><span class="cmd-prompt">&gt;</span><span class="cmd-text">${escHtml(m.content)}</span><span class="cmd-time">${time}</span></div>`;
          pendingBlock.style.animation='none';
          wrap.appendChild(pendingBlock);
        } else if((m.type==='agent'||m.type==='cmd')&&pendingBlock){
          const out=document.createElement('div');
          out.className='cmd-output';
          out.innerHTML=escHtml(m.content);
          pendingBlock.appendChild(out);
          pendingBlock=null;
        } else if(m.type==='error'){
          pendingBlock=null;
          const el=document.createElement('div');
          el.className='err-block'; el.style.animation='none';
          el.innerHTML=escHtml(m.content);
          wrap.appendChild(el);
        } else {
          pendingBlock=null;
          const el=document.createElement('div');
          el.className='sys-line'; el.style.animation='none';
          el.textContent=m.content;
          wrap.appendChild(el);
        }
      });
      wrap.scrollTop=wrap.scrollHeight;
    }catch(_){}
  }

  function clearHistory(){
    localStorage.removeItem('termi_history');
    document.getElementById('messages').innerHTML='';
    showWelcome(); showToast('history cleared'); haptic('light');
  }
  function showWelcome(){
    document.getElementById('messages').innerHTML=`
      <div class="welcome" id="welcomeCard">
        <div class="welcome-badge">
          <div class="welcome-top">$ termi ready</div>
          <div class="welcome-sub">Your remote agent is connected. Send a command or pick one below.</div>
          <div class="welcome-grid">
            <button class="wg-btn" onclick="quick('server status')"><span class="wg-icon">&#9670;</span> status</button>
            <button class="wg-btn" onclick="quick('show running processes')"><span class="wg-icon">&#9654;</span> processes</button>
            <button class="wg-btn" onclick="quick('disk usage')"><span class="wg-icon">&#9632;</span> disk</button>
            <button class="wg-btn" onclick="quick('git status')"><span class="wg-icon">&#10132;</span> git</button>
            <button class="wg-btn" onclick="quick('show recent logs')"><span class="wg-icon">&#9776;</span> logs</button>
            <button class="wg-btn" onclick="quick('deploy latest changes')"><span class="wg-icon">&#9650;</span> deploy</button>
          </div>
        </div>
      </div>`;
  }

  // Send
  function send(){
    const el=document.getElementById('input');
    const msg=el.value.trim();
    if(!msg||!connected)return;
    haptic('light'); addMsg('you',msg);
    el.value=''; resizeTA(el);
    socket.emit('chat',{message:msg});
  }
  function quick(cmd){haptic('light');document.getElementById('input').value=cmd;send();}

  // Mode
  function setMode(m){
    mode=m; haptic('light');
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+m).classList.add('active');
    const msgs=document.getElementById('messages'),qr=document.getElementById('quickRow'),inp=document.getElementById('mainInputArea'),sv=document.getElementById('screenView');
    if(m==='screens'){
      msgs.style.display='none';qr.style.display='none';inp.style.display='none';
      document.getElementById('screenBadge').classList.remove('on');
      if(currentScreenSession){sv.classList.remove('active');document.getElementById('screenTermView').classList.add('active');}
      else{sv.classList.add('active');document.getElementById('screenTermView').classList.remove('active');loadScreenSessions();startScreenRefresh();}
    } else {
      msgs.style.display='flex';qr.style.display='flex';inp.style.display='flex';
      sv.classList.remove('active');document.getElementById('screenTermView').classList.remove('active');stopScreenRefresh();
    }
  }

  // Screens
  function loadScreenSessions(){if(socket&&connected)socket.emit('screen:list');}
  function refreshScreens(){haptic('light');loadScreenSessions();showToast('refreshing...');}
  function startScreenRefresh(){stopScreenRefresh();screenRefreshInterval=setInterval(()=>{if(!currentScreenSession)loadScreenSessions();},10000);}
  function stopScreenRefresh(){if(screenRefreshInterval){clearInterval(screenRefreshInterval);screenRefreshInterval=null;}}

  function renderScreenSessions(sessions){
    const el=document.getElementById('screenSessionList');
    if(currentScreenSession)return;
    if(!sessions.length){
      el.innerHTML=`<div class="scr-empty">
        <div class="scr-empty-icon">&gt;_</div>
        <div class="scr-empty-text">No active sessions</div>
        <div class="scr-empty-hint"><span class="g">$</span> screen -S &lt;name&gt;</div>
      </div>`;
      return;
    }
    el.innerHTML=sessions.map(s=>{
      const live=s.status==='attached';
      return `<div class="scr-card ${live?'live':'idle'}" onclick="screenJoin('${escAttr(s.fullName)}','${escAttr(s.name)}','${s.status}')">
        <div class="scr-icon ${live?'live':'idle'}">&gt;_</div>
        <div class="scr-info">
          <div class="scr-name">${escHtml(s.name)}</div>
          <div class="scr-meta">
            <span class="scr-badge ${live?'live':'idle'}">${live?'live':'idle'}</span>
            <span>pid ${s.pid}</span>
          </div>
        </div>
        <div class="scr-chevron">&#8250;</div>
      </div>`;
    }).join('');
  }

  function screenJoin(fullName,name,status){
    haptic('medium'); currentScreenSession=fullName;
    document.getElementById('screenTermView').classList.add('active');
    document.getElementById('screenView').classList.remove('active');
    document.getElementById('screenTermName').textContent=name;
    const st=document.getElementById('screenTermStatus');
    const live=status==='attached';
    st.textContent=live?'LIVE':'IDLE'; st.className='stv-status '+(live?'live':'idle');
    initScreenTerminal();
    const cols=screenTerm?screenTerm.cols:80, rows=screenTerm?screenTerm.rows:24;
    socket.emit('screen:join',{sessionName:fullName,cols,rows});
  }

  function screenGoBack(){
    if(!currentScreenSession)return; haptic('light');
    socket.emit('screen:leave',{sessionName:currentScreenSession});
    currentScreenSession=null;
    if(screenTerm){window.removeEventListener('resize',handleScreenResize);screenTerm.dispose();screenTerm=null;screenFitAddon=null;}
    document.getElementById('screenTermView').classList.remove('active');
    if(mode==='screens'){document.getElementById('screenView').classList.add('active');loadScreenSessions();}
  }

  function initScreenTerminal(){
    const c=document.getElementById('screenTermContainer'); c.innerHTML='';
    screenTerm=new Terminal({
      cursorBlink:true, cursorStyle:'block', fontSize:13,
      fontFamily:'JetBrains Mono, SF Mono, monospace',
      theme:{
        background:'#0b0b0f',foreground:'#e8e8ef',cursor:'#22dd88',
        selectionBackground:'#6ba1ff44',
        black:'#0b0b0f',red:'#ff6b6b',green:'#22dd88',yellow:'#ffb347',
        blue:'#6ba1ff',magenta:'#c084fc',cyan:'#22d3ee',white:'#e8e8ef',
        brightBlack:'#555568',brightRed:'#ff8a80',brightGreen:'#69f0ae',
        brightYellow:'#ffd740',brightBlue:'#82b1ff',brightMagenta:'#ea80fc',
        brightCyan:'#84ffff',brightWhite:'#ffffff',
      },
      scrollback:5000, allowProposedApi:true,
    });
    screenFitAddon=new FitAddon.FitAddon();
    screenTerm.loadAddon(screenFitAddon); screenTerm.open(c);
    screenTerm.onData(d=>{if(socket&&currentScreenSession)socket.emit('screen:input',{sessionName:currentScreenSession,data:d});});
    setTimeout(()=>screenFitAddon.fit(),100);
    setTimeout(()=>screenFitAddon.fit(),300);
    window.addEventListener('resize',handleScreenResize);
  }

  function handleScreenResize(){
    if(screenFitAddon&&screenTerm){screenFitAddon.fit();
      if(socket&&currentScreenSession)socket.emit('screen:resize',{sessionName:currentScreenSession,cols:screenTerm.cols,rows:screenTerm.rows});
    }
  }

  // Swipe back
  document.addEventListener('touchstart',e=>{if(!currentScreenSession)return;swipeStartX=e.touches[0].clientX;swipeStartY=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{if(!currentScreenSession)return;const dx=e.changedTouches[0].clientX-swipeStartX,dy=Math.abs(e.changedTouches[0].clientY-swipeStartY);if(swipeStartX<30&&dx>80&&dy<80)screenGoBack();},{passive:true});

  // Pull to refresh
  let ptrStartY=0,ptrActive=false;
  function setupPullToRefresh(){
    const list=document.getElementById('screenSessionList');
    list.addEventListener('touchstart',e=>{if(list.scrollTop===0){ptrStartY=e.touches[0].clientY;ptrActive=true;}},{passive:true});
    list.addEventListener('touchend',e=>{if(!ptrActive)return;ptrActive=false;if(e.changedTouches[0].clientY-ptrStartY>60){haptic('light');loadScreenSessions();showToast('refreshing...');}},{passive:true});
  }

  // Agent
  function switchAgent(type){if(!socket||!connected||type===activeAgent)return;haptic('medium');socket.emit('setAgent',{type});}
  function setAgentUI(type){activeAgent=type;document.querySelectorAll('.agent-btn').forEach(b=>b.classList.remove('active'));document.getElementById('opt-'+type).classList.add('active');}

  // Utils
  function setStatus(state,text){
    const d=document.getElementById('statusDot');
    d.className='h-dot'+(state==='on'?' on':state==='err'?' err':'');
    document.getElementById('statusText').textContent=text;
  }
  function onKey(e){const mob=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);if(!mob&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
  function resizeTA(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
  function escHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}
  function escAttr(t){return String(t).replace(/'/g,"\\'").replace(/"/g,'&quot;');}

  // Keyboard awareness
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      if(window.innerHeight-window.visualViewport.height>100){
        setTimeout(()=>{document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
          if(screenFitAddon&&screenTerm&&currentScreenSession)screenFitAddon.fit();},100);
      }
    });
  }

  // Init
  window.addEventListener('load',()=>{
    const saved=localStorage.getItem('termi_token');
    if(saved){token=saved;initSocket();}
    else{hideSplash();document.getElementById('auth').style.display='flex';}
    loadHistory();
    document.getElementById('tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')authenticate();});
    document.getElementById('input').addEventListener('input',()=>{document.getElementById('sendBtn').disabled=!connected;});
    setupPullToRefresh();
    setTimeout(()=>{if(!connected&&document.getElementById('splash').style.display!=='none'){hideSplash();if(!token)document.getElementById('auth').style.display='flex';}},5000);
  });

  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
