    blue:  {accent:'#6ba1ff',accentDark:'#3b82f6',dim:'rgba(107,161,255,0.08)',mid:'rgba(107,161,255,0.15)',glow:'rgba(107,161,255,0.25)'},
    amber: {accent:'#ffb347',accentDark:'#f59e0b',dim:'rgba(255,179,71,0.08)',mid:'rgba(255,179,71,0.15)',glow:'rgba(255,179,71,0.25)'},
    purple:{accent:'#c084fc',accentDark:'#9333ea',dim:'rgba(192,132,252,0.08)',mid:'rgba(192,132,252,0.15)',glow:'rgba(192,132,252,0.25)'},
  };
  function setTheme(name){
    const t=themes[name]; if(!t)return;
    currentTheme=name; localStorage.setItem('termi_theme',name);
    const r=document.documentElement.style;
    r.setProperty('--green',t.accent); r.setProperty('--green-dim',t.dim);
    r.setProperty('--green-mid',t.mid); r.setProperty('--green-glow',t.glow);
    // Update gradient buttons
    document.querySelectorAll('.h-logo,.splash-icon,.auth-icon,.auth-btn,.prompt-send:not(.busy)').forEach(el=>{
      el.style.background=`linear-gradient(135deg,${t.accent},${t.accentDark})`;
    });
    // Update theme dots
    document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
    const dots=document.querySelectorAll('.theme-dot');
    const idx={green:0,blue:1,amber:2,purple:3}[name];
    if(dots[idx])dots[idx].classList.add('active');
    haptic('light'); showToast(name+' theme');
  }

  // Notification sound (short beep using Web Audio API)
  function playNotif(){
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator(); const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine'; osc.frequency.value=880;
      gain.gain.setValueAtTime(0.15,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
      osc.start(); osc.stop(ctx.currentTime+0.15);
    }catch(_){}
  }

  // Long-press to copy on mobile
  function setupLongPress(){
    let timer=null,target=null;
    document.getElementById('messages').addEventListener('touchstart',e=>{
      const out=e.target.closest('.cmd-output');
      if(!out)return;
      target=out; timer=setTimeout(()=>{
        const clone=out.cloneNode(true);
        clone.querySelectorAll('.copy-btn').forEach(b=>b.remove());
        navigator.clipboard.writeText(clone.textContent.trim()).then(()=>{showToast('copied');haptic('medium');});
      },600);
    },{passive:true});
    document.getElementById('messages').addEventListener('touchend',()=>{clearTimeout(timer);},{passive:true});
    document.getElementById('messages').addEventListener('touchmove',()=>{clearTimeout(timer);},{passive:true});
  }

  // Double-tap to retry last command
  let lastTap=0;
  function setupDoubleTapRetry(){
    document.getElementById('messages').addEventListener('touchend',e=>{
      const now=Date.now();
      if(now-lastTap<300&&lastInputMsg&&connected&&!agentBusy){
        haptic('medium');
        addMsg('you',lastInputMsg);
        socket.emit('chat',{message:lastInputMsg});
        showToast('retrying...');
      }
      lastTap=now;
    },{passive:true});
  }

  // Keyboard awareness
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      if(window.innerHeight-window.visualViewport.height>100){
        setTimeout(()=>{document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
          if(screenPanes.size>0)refitAllPanes();},100);
      }
    });
  }

  // Init
  window.addEventListener('load',()=>{
    const saved=localStorage.getItem('termi_token');
    if(saved){token=saved;initSocket();}
    else{hideSplash();document.getElementById('auth').style.display='flex';}
    loadHistory();
    document.getElementById('tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')authenticate();});
    document.getElementById('input').addEventListener('input',()=>{document.getElementById('sendBtn').disabled=!connected;});
    setupPullToRefresh();
    setupScrollLock();
    setupLongPress();
    setupDoubleTapRetry();
    // Restore theme
    if(currentTheme!=='green')setTheme(currentTheme);
    setTimeout(()=>{if(!connected&&document.getElementById('splash').style.display!=='none'){hideSplash();if(!token)document.getElementById('auth').style.display='flex';}},5000);
  });

  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
