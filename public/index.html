<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Terminal</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #0088ff;
    --danger: #ff3366;
    --text: #e0e0f0;
    --muted: #4a4a6a;
    --agent: #00ff88;
    --command: #0088ff;
    --error: #ff3366;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scanline effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 8px;
    transition: all 0.3s;
  }

  .status-dot.connected {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  .status-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  .connect-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .connect-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .connect-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Mode tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
  }

  .tab {
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'JetBrains Mono', monospace;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-meta {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .message-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
  }

  .label-you {
    background: rgba(0,136,255,0.15);
    color: var(--command);
    border: 1px solid rgba(0,136,255,0.3);
  }

  .label-agent {
    background: rgba(0,255,136,0.1);
    color: var(--agent);
    border: 1px solid rgba(0,255,136,0.2);
  }

  .label-cmd {
    background: rgba(0,136,255,0.1);
    color: var(--command);
    border: 1px solid rgba(0,136,255,0.2);
  }

  .label-error {
    background: rgba(255,51,102,0.1);
    color: var(--error);
    border: 1px solid rgba(255,51,102,0.2);
  }

  .label-system {
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .message-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 100%;
  }

  .message-content.user-msg {
    border-left: 3px solid var(--command);
    background: rgba(0,136,255,0.05);
  }

  .message-content.agent-msg {
    border-left: 3px solid var(--agent);
    color: #b0ffcc;
  }

  .message-content.error-msg {
    border-left: 3px solid var(--danger);
    color: var(--error);
  }

  .message-content.thinking-msg {
    border-left: 3px solid var(--muted);
    color: var(--muted);
    font-style: italic;
  }

  /* Thinking animation */
  .thinking-dots::after {
    content: '...';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .prompt-prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 14px;
    pointer-events: none;
    line-height: 1;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 12px 14px 12px 30px;
    resize: none;
    outline: none;
    border-radius: 4px;
    line-height: 1.5;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    white-space: nowrap;
    height: 44px;
  }

  .send-btn:hover { background: #00cc6a; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .mode-hint {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .mode-hint span {
    color: var(--accent);
  }

  /* Quick commands */
  .quick-cmds {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .quick-cmd {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .quick-cmd:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Auth overlay */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 24px;
  }

  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .auth-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: var(--accent);
  }

  .auth-subtitle {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .auth-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    width: 100%;
    border-radius: 4px;
  }

  .auth-input:focus { border-color: var(--accent); }

  .auth-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }

  .auth-btn:hover { background: #00cc6a; }
  .auth-error { color: var(--danger); font-size: 11px; }

  /* ─── MOBILE RESPONSIVE ─────────────────────────── */
  @media (max-width: 600px) {
    header {
      padding: 12px 16px;
    }

    .logo { font-size: 15px; }

    .connect-btn {
      padding: 5px 10px;
      font-size: 10px;
    }

    .tabs { padding: 0 12px; }

    .tab {
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .messages {
      padding: 12px;
      gap: 12px;
    }

    .message-content {
      font-size: 12px;
      padding: 10px 12px;
    }

    .message-label {
      font-size: 9px;
      padding: 2px 6px;
    }

    .input-area {
      padding: 10px 12px;
      gap: 8px;
    }

    .quick-cmds {
      gap: 6px;
      overflow-x: auto;
      flex-wrap: nowrap;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .quick-cmds::-webkit-scrollbar { display: none; }

    .quick-cmd {
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 10px;
      padding: 5px 10px;
    }

    textarea {
      font-size: 16px; /* prevents iOS zoom on focus */
      padding: 10px 10px 10px 28px;
    }

    .send-btn {
      padding: 10px 14px;
      font-size: 11px;
      height: 42px;
    }

    .mode-hint { display: none; }

    .auth-box {
      width: 90%;
      padding: 28px 20px;
    }

    .auth-title { font-size: 20px; }

    /* Fix viewport height on mobile browsers */
    body {
      height: 100dvh;
    }
  }

  @media (max-width: 380px) {
    .tab { padding: 8px 8px; font-size: 9px; }
    .logo { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-title">AGENT//UI</div>
    <div class="auth-subtitle">Enter your access token to connect to the remote agent interface.</div>
    <input type="password" class="auth-input" id="tokenInput" placeholder="access token" />
    <div class="auth-error" id="authError"></div>
    <button class="auth-btn" onclick="authenticate()">AUTHENTICATE →</button>
  </div>
</div>

<header>
  <div class="logo">AGENT<span>//</span>UI</div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="status-text">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">disconnected</span>
    </div>
    <button class="connect-btn" id="resetBtn" onclick="resetAgent()" style="border-color:var(--muted);color:var(--muted)">RESET</button>
    <button class="connect-btn" id="connectBtn" onclick="connect()">CONNECT</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="setMode('chat')" id="tab-chat">💬 Agent Chat</button>
  <button class="tab" onclick="setMode('command')" id="tab-command">⚡ Run Command</button>
</div>

<div class="messages" id="messages">
  <div class="message">
    <div class="message-meta"><span class="message-label label-system">SYSTEM</span></div>
    <div class="message-content thinking-msg">Connect to your Hetzner server to start. Click CONNECT above.</div>
  </div>
</div>

<div class="input-area">
  <div class="quick-cmds" id="quickCmds">
    <button class="quick-cmd" onclick="quickCmd('check server status')">server status</button>
    <button class="quick-cmd" onclick="quickCmd('show running processes')">processes</button>
    <button class="quick-cmd" onclick="quickCmd('show disk usage')">disk usage</button>
    <button class="quick-cmd" onclick="quickCmd('show recent logs')">recent logs</button>
    <button class="quick-cmd" onclick="quickCmd('deploy latest changes')">deploy</button>
  </div>
  <div class="input-row">
    <div class="input-wrapper">
      <span class="prompt-prefix">›</span>
      <textarea 
        id="msgInput" 
        placeholder="Message your agent or run a command..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()">SEND ↵</button>
  </div>
  <div class="mode-hint" id="modeHint">Mode: <span>Agent Chat</span> — messages go to Claude CLI via tmux</div>
</div>

<script>
  let socket = null;
  let authToken = '';
  let mode = 'chat';
  let connected = false;

  function authenticate() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) {
      document.getElementById('authError').textContent = 'Token required';
      return;
    }
    authToken = token;
    localStorage.setItem('agentToken', token);
    document.getElementById('authOverlay').style.display = 'none';
    initSocket();
  }

  function initSocket() {
    socket = io({ auth: { token: authToken } });

    socket.on('connect_error', (err) => {
      document.getElementById('authOverlay').style.display = 'flex';
      document.getElementById('authError').textContent = 'Invalid token';
    });

    socket.on('status', ({ connected: c, message }) => {
      connected = c;
      updateStatus(c ? 'connected' : 'error', message);
      addMessage('system', message);
      if (c) document.getElementById('connectBtn').textContent = 'CONNECTED';
    });

    let thinkingEl = null;

    socket.on('response', ({ type, content }) => {
      if (type === 'thinking') {
        // Update existing thinking message in place instead of adding new ones
        if (thinkingEl) {
          thinkingEl.querySelector('.message-content span').textContent = content;
        } else {
          thinkingEl = addMessage(type, content);
        }
      } else {
        // Remove thinking message when real response arrives
        if (thinkingEl) {
          thinkingEl.remove();
          thinkingEl = null;
        }
        addMessage(type, content);
      }
    });
  }

  function resetAgent() {
    if (!socket) return;
    socket.emit('reset');
  }

  function connect() {
    if (!socket) return;
    if (connected) return;
    updateStatus('connecting', 'connecting...');
    socket.emit('init');
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${m}`).classList.add('active');
    const hint = document.getElementById('modeHint');
    if (m === 'chat') {
      hint.innerHTML = 'Mode: <span>Agent Chat</span> — messages go to Claude CLI via tmux';
      document.getElementById('msgInput').placeholder = 'Message your agent...';
    } else {
      hint.innerHTML = 'Mode: <span>Command</span> — runs directly on server shell';
      document.getElementById('msgInput').placeholder = 'ls -la, ps aux, cat file.log...';
    }
  }

  function send() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg || !connected) return;

    addMessage('user', msg);
    input.value = '';
    autoResize(input);

    if (mode === 'chat') {
      socket.emit('chat', { message: msg });
    } else {
      socket.emit('command', { command: msg });
    }
  }

  function quickCmd(cmd) {
    document.getElementById('msgInput').value = cmd;
    send();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function addMessage(type, content) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message';
    div.dataset.type = type;

    const labelMap = {
      user: ['YOU', 'label-you'],
      agent: ['AGENT', 'label-agent'],
      command: ['CMD OUTPUT', 'label-cmd'],
      error: ['ERROR', 'label-error'],
      system: ['SYSTEM', 'label-system'],
      thinking: ['THINKING', 'label-system'],
    };

    const [label, labelClass] = labelMap[type] || ['INFO', 'label-system'];
    const time = new Date().toLocaleTimeString();

    const contentClass = {
      user: 'user-msg',
      agent: 'agent-msg',
      error: 'error-msg',
      thinking: 'thinking-msg',
    }[type] || '';

    const thinkingClass = type === 'thinking' ? 'thinking-dots' : '';

    div.innerHTML = `
      <div class="message-meta">
        <span class="message-label ${labelClass}">${label}</span>
        <span>${time}</span>
      </div>
      <div class="message-content ${contentClass}">
        <span class="${thinkingClass}">${escapeHtml(content)}</span>
      </div>
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function updateStatus(state, text) {
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    dot.className = 'status-dot';
    if (state === 'connected') dot.classList.add('connected');
    if (state === 'error') dot.classList.add('error');
    statusText.textContent = text || state;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Check saved token
  window.onload = () => {
    const saved = localStorage.getItem('agentToken');
    if (saved) {
      authToken = saved;
      document.getElementById('authOverlay').style.display = 'none';
      initSocket();
    }

    // Enter key on auth
    document.getElementById('tokenInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') authenticate();
    });
  };
</script>
</body>
</html>
